<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ultimate Glass</title>
    <link rel='stylesheet' href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <canvas id="particles" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;"></canvas>
    
    <div class="wrapper">
        <div class="outer-glow-container">
            <div class="admin-panel">
                <div class="panel-header">
                    <h1>ADMIN PORTAL</h1>
                    
                </div>
                


                
                <div class="cards-grid">
                    <div class="SquareCard" onclick="location.href='new_student.html'">
                        <div class="card-content">
                            <img src="https://cdn-icons-png.flaticon.com/512/3449/3449692.png" alt="Dashboard" class="card-img">
                            <span>Add Student</span>
                        </div>
                    </div>

                    <div class="SquareCard" onclick="location.href='campus_monitoring.html'">
                        <div class="card-content">
                            <img src="https://cdn-icons-png.flaticon.com/512/2933/2933245.png" alt="Add Student" class="card-img">
                            <span>Campus Monitoring</span>
                        </div>
                    </div>

                    <div class="SquareCard" onclick="location.href='analysis.html'">
                        <div class="card-content">
                            <img src="https://cdn-icons-png.flaticon.com/512/3557/3557655.png" alt="Analytics" class="card-img">
                            <span>Analytics</span>
                        </div>
                    </div>
                </div>

                <div class="panel-footer">
                    <button class="logout-btn" onclick="location.href='index.html'">
                        <i class='bx bx-log-out-circle'></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("particles");
        if(canvas) {
            const ctx = canvas.getContext("2d");
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            let particles = [];
            for(let i = 0; i < 70; i++){
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.8,
                    d: Math.random() * 0.5 + 0.2
                });
            }

            function draw(){
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                    p.y += p.d;
                    if(p.y > canvas.height){ 
                        p.y = -10; 
                        p.x = Math.random() * canvas.width; 
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
