<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Ultimate Glow</title>
    <link rel='stylesheet' href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-blue: #00d2ff;
            --glow-green: #3fffcf;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --text-color: #ffffff;
            --card-inner: rgba(20, 20, 20, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #020617; 
            background-image: url('clg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); 
            z-index: 0;
        }

        /* --- THE GLOWING MAIN PANEL --- */
        .outer-glow-container {
            position: relative;
            width: 550px;
            padding: 3px;
            border-radius: 43px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            animation: slideIn 0.8s ease-out;
        }

        .outer-glow-container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                transparent, 
                var(--glow-blue), 
                var(--glow-green), 
                transparent 40%
            );
            animation: rotate 6s linear infinite;
        }

        .admin-panel {
            position: relative;
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            color: var(--text-color);
            z-index: 3;
        }

        .panel-header h1 {
            font-size: 2.2rem;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        /* --- BUTTONS GRID --- */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            justify-items: center;
            margin-bottom: 40px;
        }

        /* --- SHARP GLOWING CARDS --- */
        .SquareCard {
            position: relative;
            width: 190px;
            height: 190px;
            background: #111;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .SquareCard::before {
            content: '';
            position: absolute;
            width: 160%;
            height: 160%;
            background: conic-gradient(
                transparent, 
                var(--glow-green), 
                var(--glow-blue), 
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        .SquareCard::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--card-inner);
            border-radius: 23px;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        /* --- CARD IMAGE STYLES --- */
        .card-image {
            width: 75px;
            height: 75px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.6));
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .SquareCard:hover .card-image {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 0 15px var(--glow-green));
        }

        .card-content span {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #fff;
            text-transform: uppercase;
        }

        .SquareCard:hover {
            transform: scale(1.05) translateY(-8px);
        }

        /* --- LOGOUT BUTTON --- */
        .logout-btn {
            padding: 14px 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .logout-btn:hover {
            background: #fff;
            color: #111;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--glow-blue);
        }

        /* --- ANIMATIONS --- */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 550px) {
            .outer-glow-container { width: 95%; }
            .SquareCard { width: 150px; height: 150px; }
            .card-image { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>
    <canvas id="particles" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;"></canvas>

    <div class="outer-glow-container">
        <div class="admin-panel">
            <div class="panel-header">
                <h1>TEACHER PORTAL</h1>
            </div>

            <div class="buttons-grid">
                <div class="SquareCard" onclick="location.href='attendance.html'">
                    <div class="card-content">
                        <img src="https://cdn-icons-png.flaticon.com/512/3589/3589030.png" alt="Attendance" class="card-image">
                        <span>Attendance</span>
                    </div>
                </div>

                <div class="SquareCard" onclick="location.href='prediction.html'">
                    <div class="card-content">
                        <img src="https://cdn-icons-png.flaticon.com/512/4201/4201971.png" alt="Prediction" class="card-image">
                        <span>Progress</span>
                    </div>
                </div>
            </div>

            <div class="panel-footer" style="display:flex; justify-content:center;">
                <button class="logout-btn" onclick="location.href='index.html'">
                    <i class='bx bx-log-out-circle'></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        const setCanvasSize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        setCanvasSize();

        let particles = [];
        for(let i = 0; i < 50; i++){
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2,
                d: Math.random() * 0.5 + 0.2
            });
        }

        function draw(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                p.y += p.d;
                if(p.y > canvas.height){ p.y = -10; p.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(draw);
        }
        draw();
        window.onresize = setCanvasSize;
    </script>
</body>
</html>
